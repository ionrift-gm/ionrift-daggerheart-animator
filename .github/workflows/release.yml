name: Release Creation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run_discord:
        description: 'Post Discord notification only (no release artifact)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    permissions:
      contents: write
    uses: ionrift-gm/ionrift-ci/.github/workflows/release.yml@main
    with:
      dry_run_discord: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run_discord == true }}
      checkout_lfs: false
      validate_lfs_pack_mp3: false
      zip_extra_args: ''
      discord_title_prefix: 'Ionrift: Daggerheart Animator'
      discord_embed_color: '8151295'
      discord_thumbnail_url: ''
      skip_discord_job: false
    secrets:
      FOUNDRY_PACKAGE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
